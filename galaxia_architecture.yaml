# SUPER BRAIN GALAXIA - Complete Architecture Configuration
# System: Agentic AI Enterprise Framework for Hetzner 128GB Dedicated Server
# Version: 2026.3.2 | Status: Production Ready | Aggressive Growth Mode: ENABLED

version: "2026.3.2"
name: "Super Brain Galaxia"
philosophy: "Cosmological Multi-Agent Orchestration with Planetary Isolation"

# =============================================================================
# GRAVITATIONSZENTRUM: Gateway Control Plane
# =============================================================================
gateway:
  name: "The Super Brain"
  framework: "OpenClaw v2026.3.2"
  role: "Central Orchestrator & Gravitational Hub"

  network:
    primary_port: 18789
    bind_address: "127.0.0.1"  # Loopback only, access via proxy
    websocket_enabled: true
    authentication:
      require_tokens: true
      token_rotation_hours: 24
      mfa_enabled: true

  capabilities:
    - orchestration: "Multi-agent routing & coordination"
    - persistence: "State management across planets"
    - security: "SecretRef system for API keys"
    - monitoring: "Real-time health checks every 30s"
    - healing: "Autonomous Guardian system"
    - logging: "Immutable audit trails (ZFS)"

# =============================================================================
# PLANETEN: Specialized Agent Ecosystems
# =============================================================================
planets:
  # Planet 1: Intelligence & Insights
  - name: "Intelligence Planet"
    code: "PLANET_INTEL"
    specialization: "X.com monitoring, trend detection, market research"
    isolation: "docker"
    resources:
      ram_gb: 16
      cpu_cores: 4
      storage_gb: 50

    agents:
      - name: "X-Monitor Agent"
        role: "Real-time trend detection from 25 AI experts"
        model: "claude-sonnet-4-6"  # Cost-optimized
        capabilities:
          - twitter_monitoring
          - trend_detection (3x mention = implement)
          - insight_extraction

      - name: "Research Agent"
        role: "Deep market & competitor analysis"
        model: "gpt-5.4"  # Superior analytical power
        capabilities:
          - semantic_search
          - pattern_recognition
          - competitive_intelligence

  # Planet 2: Code & Implementation
  - name: "Engineering Planet"
    code: "PLANET_ENGG"
    specialization: "Code generation, sandbox testing, auto-deployment"
    isolation: "docker"
    resources:
      ram_gb: 32
      cpu_cores: 8
      storage_gb: 100

    agents:
      - name: "Code-Gen Agent"
        role: "Auto-implementation of trending concepts"
        model: "qwen3-coder-30b"  # Local, ultra-fast
        capabilities:
          - code_generation
          - fill_in_middle
          - refactoring
          - system_integration

      - name: "Sandbox Agent"
        role: "Isolated testing in containerized environments"
        model: "claude-opus-4-6"  # Maximum accuracy for critical tests
        capabilities:
          - sandbox_execution
          - metrics_collection
          - failure_diagnosis
          - ab_testing_orchestration

      - name: "Deployment Agent"
        role: "Safe, audited rollout to production"
        model: "deepseek-v3.2"  # Local reasoning for complex logic
        capabilities:
          - approval_gate_management
          - canary_deployment
          - rollback_automation
          - health_verification

  # Planet 3: Business & Revenue
  - name: "Commerce Planet"
    code: "PLANET_COMMERCE"
    specialization: "Revenue generation, monetization, B2B/B2C sales"
    isolation: "docker"
    resources:
      ram_gb: 12
      cpu_cores: 3
      storage_gb: 30

    agents:
      - name: "Monetization Agent"
        role: "Multi-channel revenue automation"
        model: "claude-opus-4-6"
        capabilities:
          - gumroad_automation
          - fiverr_upwork_listing
          - consulting_pipeline
          - community_management

      - name: "Sales Agent"
        role: "Lead generation and conversion"
        model: "gpt-5.4"  # Superior persuasion & negotiation
        capabilities:
          - lead_scoring
          - email_sequences
          - sales_optimization
          - revenue_forecasting

  # Planet 4: Knowledge & Memory
  - name: "Knowledge Planet"
    code: "PLANET_MEMORY"
    specialization: "Historical data ingestion, RAG, persistent learning"
    isolation: "docker"
    resources:
      ram_gb: 20
      cpu_cores: 4
      storage_gb: 200

    agents:
      - name: "Data-Harvester Agent"
        role: "Ingest ChatGPT/Claude/Gemini/Grok conversations"
        model: "claude-sonnet-4-6"
        capabilities:
          - conversation_parsing
          - insight_extraction
          - pattern_discovery
          - rag_indexing

      - name: "Memory-Consolidator Agent"
        role: "Unified knowledge store across all sources"
        model: "deepseek-v3.2"
        capabilities:
          - semantic_consolidation
          - duplicate_elimination
          - context_optimization
          - embedding_management

  # Planet 5: Infrastructure & Operations
  - name: "Operations Planet"
    code: "PLANET_OPS"
    specialization: "System health, auto-repair, compliance monitoring"
    isolation: "docker"
    resources:
      ram_gb: 8
      cpu_cores: 2
      storage_gb: 25

    agents:
      - name: "Guardian Agent"
        role: "Continuous health monitoring & auto-repair"
        model: "glm-5"  # Fast, lightweight
        capabilities:
          - health_checks (every 30s)
          - error_diagnosis
          - self_healing
          - config_validation

      - name: "Compliance Agent"
        role: "GDPR/EU AI Act adherence"
        model: "claude-opus-4-6"  # Legal accuracy critical
        capabilities:
          - gdpr_compliance_checking
          - audit_trail_management
          - consent_verification
          - data_localization_enforcement

# =============================================================================
# STORAGE: ZFS Compression & Optimization
# =============================================================================
storage:
  filesystem: "ZFS"
  root_pool: "galaxia-tank"

  compression_strategies:
    # Strategy 1: Active Workspaces (LZ4)
    active_workspaces:
      algorithm: "lz4"
      expected_ratio: "1.5:1 to 2.0:1"
      use_case: "Agent workspaces, vector databases, SQLite"
      performance_impact: "Minimal CPU overhead, improves I/O"
      volumes:
        - "/opt/openclaw/workspace_galaxia"
        - "/var/lib/vectordb"
        - "/var/lib/sqlite"

    # Strategy 2: Archives (ZSTD)
    archives:
      algorithm: "zstd"
      expected_ratio: "2.5:1 to 3.0:1"
      use_case: "Backups, historical data, cold storage"
      performance_impact: "Moderate CPU, excellent compression"
      volumes:
        - "/archive/conversations"
        - "/archive/backups"
        - "/archive/chat_history"

    # Strategy 3: Deduplication
    deduplication:
      enabled: true
      volumes:
        - "/var/lib/docker/images"  # Heavy redundancy across agent images
      expected_ratio: "2.0:1 to 4.0:1"
      ram_requirement_gb: 3  # Per TB of storage
      warning: "High permanent RAM overhead - use selectively"

  snapshots:
    frequency: "every 6 hours"
    retention: "30 snapshots (7.5 days)"
    automated_cleanup: true
    format: "tar.gz with encryption"

# =============================================================================
# iCLOUD SYNC: Rclone Bidirectional Synchronization
# =============================================================================
icloud_sync:
  enabled: true
  tool: "Rclone v1.69+"
  sync_mode: "bisync"  # Bidirectional synchronization

  configuration:
    remote_name: "icloud_galaxia"
    local_path: "/opt/openclaw/workspace_galaxia"
    icloud_path: "/iCloud Drive/AIEmpire-Galaxia"

    sync_params:
      compare_mode: "size,modtime,checksum"
      resilient: true
      max_retries: 5
      check_interval: "1 hour"

    filters:
      exclude:
        - "node_modules/"
        - ".docker/"
        - "*.tmp"
        - "__pycache__/"
        - ".git/objects/"
        - "cache/"

      include:
        - "AGENTS.md"
        - "*.json"
        - "*.md"
        - "*.py"
        - "*.yaml"

  authentication:
    method: "OAuth 2FA"
    token_expiry_days: 30
    auto_renewal: true
    requires_2fa: true
    advanced_data_protection: false  # Must be disabled for API access
    web_access_enabled: true

  cron_job:
    schedule: "0 * * * *"  # Every hour
    command: "rclone bisync {local_path} {icloud_path} --resilient"
    notification_on_error: true

  backup_strategy:
    - "Project DNA" (AGENTS.md, CONFIG, SKILLS)
    - "State snapshots" (every 6h)
    - "Encrypted archives" (weekly full backup)

# =============================================================================
# MODEL ROUTING: Intelligent Multi-Model Selection
# =============================================================================
model_routing:
  strategy: "intelligent_dispatch"
  selection_criteria: "cost, latency, task-type, compliance"

  cloud_models:
    gpt_5_4:
      provider: "OpenAI"
      release_date: "2026-03"
      context_tokens: 1050000
      computer_use: true
      cost_per_mtok: "$15"
      ideal_for:
        - "Complex planning & orchestration"
        - "Native computer control"
        - "Long-context understanding"
      approval_gate: true

    claude_opus_4_6:
      provider: "Anthropic"
      release_date: "2025-10"
      context_tokens: 200000
      extended_thinking: true
      cost_per_mtok: "$18"
      ideal_for:
        - "Legal analysis & compliance"
        - "Code refactoring & review"
        - "Deep analytical tasks"
        - "Safety-critical operations"
      approval_gate: true

    gemini_3_1_pro:
      provider: "Google"
      release_date: "2025-11"
      context_tokens: 1000000
      multimodal: true
      cost_per_mtok: "$3.50"
      ideal_for:
        - "Multimodal analysis (images/video)"
        - "Google ecosystem integration"
        - "Real-time web search"
      approval_gate: false

    grok:
      provider: "xAI"
      release_date: "2024-10"
      context_tokens: 128000
      real_time_data: true
      cost_per_mtok: "$5"
      ideal_for:
        - "Twitter/X real-time intelligence"
        - "Current events & trends"
        - "Unfiltered analysis"
      approval_gate: false

  local_models:
    qwen3_coder_30b:
      params: 30000000000
      format: "GGUF (8-bit)"
      ram_required_gb: 32
      inference_speed: "Ultra-fast (50 t/s)"
      ideal_for:
        - "Code generation (FIM)"
        - "Sub-agent orchestration"
        - "Fast iterations"
      cost: "Free (local)"
      approval_gate: false

    deepseek_v3_2_special:
      params: 67000000000
      format: "GGUF (4-bit)"
      ram_required_gb: 24
      inference_speed: "Fast (20 t/s)"
      ideal_for:
        - "Local reasoning tasks"
        - "Complex logic without API"
        - "Sensitive data processing"
      cost: "Free (local)"
      approval_gate: false

    glm_5:
      params: 10000000000
      format: "GGUF"
      ram_required_gb: 8
      inference_speed: "Very fast (100+ t/s)"
      ideal_for:
        - "Fast responses"
        - "Lightweight tasks"
        - "Server health checks"
      cost: "Free (local)"
      approval_gate: false

  routing_rules:
    sensitive_data:
      rule: "Only local models + EU servers"
      logic: "HR, legal, financial → DeepSeek/GLM-5 locally"
      compliance: "GDPR Article 48 (no US transfer)"

    budget_constrained:
      rule: "Prefer local models first"
      logic: "Try local → Gemini 3.1 → GPT-5.4"
      cost_limit: "€0.10 per request max"

    maximum_quality:
      rule: "GPT-5.4 for critical decisions"
      logic: "Legal, financial, safety-critical → GPT-5.4"
      cost_limit: "Unlimited"

    speed_critical:
      rule: "Local models only"
      logic: "Real-time responses → Qwen3/GLM-5"

# =============================================================================
# AUTOMATION: Heartbeat & Cron Jobs
# =============================================================================
automation:
  heartbeat:
    enabled: true
    interval_minutes: 30
    context: "main_session"

    checks:
      - inbox_monitoring
      - calendar_sync
      - system_alerts
      - project_status
      - task_prioritization

    smart_suppression: true  # Don't notify if nothing important
    model: "glm-5"  # Fast & lightweight

  cron_jobs:
    - name: "X-Monitor Check"
      schedule: "0 * * * *"  # Every hour
      timezone: "Europe/Berlin"
      context: "isolated"
      model: "claude-sonnet-4-6"
      command: "neural_brain_x_monitor.py simulate"
      staggering: "0-5 minutes"  # Spread load

    - name: "Data Harvester"
      schedule: "0 2 * * *"  # Daily 2 AM
      context: "isolated"
      model: "gpt-5.4"  # Deep analysis overnight
      command: "neural_brain_data_harvester.py harvest"
      approval_gate: false

    - name: "Implementation Batch"
      schedule: "0 6 * * *"  # Daily 6 AM
      context: "isolated"
      model: "deepseek-v3.2"
      command: "neural_brain_auto_implementation.py batch"
      approval_gate: false

    - name: "Revenue Report"
      schedule: "0 18 * * *"  # Daily 6 PM
      context: "main_session"
      model: "claude-opus-4-6"
      command: "Generate revenue report"
      notification: true

    - name: "System Health Check"
      schedule: "*/30 * * * *"  # Every 30 minutes
      context: "isolated"
      model: "glm-5"
      command: "openclaw doctor --check"
      alert_on_failure: true

# =============================================================================
# IMMORTALITY LAYER: Self-Healing & Resilience
# =============================================================================
immortality:
  guardian:
    enabled: true
    check_interval_seconds: 30

    health_checks:
      - gateway_port_availability
      - process_integrity
      - config_validity
      - database_connections
      - api_quota_status

    auto_repair:
      enabled: true
      attempts: 3
      strategies:
        - "Normalize JSON configs"
        - "Migrate database schemas"
        - "Renew authentication tokens"
        - "Restart failed services"

    escalation:
      failed_repair: "Git rollback to last working commit"
      git_rollback_enabled: true
      rollback_time_seconds: 30

    notifications:
      channel: "discord"
      alert_on_repair: true
      alert_on_rollback: true

  backup_system:
    enabled: true
    tool: "MyClaw Backup Skill"

    backup_frequency: "every 6 hours"
    backup_types:
      - "Full system state (.tar.gz encrypted)"
      - "Configuration snapshot"
      - "Vector database backup"
      - "Cron job definitions"
      - "API credentials (encrypted)"

    retention: "30 daily, 52 weekly, 12 monthly"
    storage: "iCloud + local ZFS snapshot"

    recovery_procedure:
      time_to_recover: "< 5 minutes"
      data_loss: "0 (no data loss guaranteed)"
      process: "Extract .tar.gz → Restore configs → Validate → Start services"

  config_guardian:
    enabled: true
    on_change: "Automatic validation"
    features:
      - "JSON schema validation"
      - "Dry-run simulation"
      - "Rollback capability"
      - "Change audit trail"

# =============================================================================
# COMPLIANCE: GDPR & EU AI Act
# =============================================================================
compliance:
  framework: "GDPR + EU AI Act (2026)"

  data_protection:
    principle: "Data Protection by Design (Art. 25 GDPR)"

    sensitive_data_handling:
      categories:
        - "HR Information"
        - "Legal Documents"
        - "Financial Data"
        - "Customer Conversations"

      processing_rule: "Local models only (DeepSeek, GLM-5)"
      location: "EU servers only (Hetzner Germany)"
      no_us_transfer: true
      justification: "GDPR Art. 48 (no adequacy decision for US)"

    non_sensitive_data_handling:
      categories:
        - "Code generation requests"
        - "Market research"
        - "General AI tasks"
      processing_rule: "Can use cloud models (GPT-5.4, Claude, Gemini)"
      cost_optimization: true

  transparency:
    approval_gates:
      enabled: true
      trigger: "Critical, irreversible actions"
      examples:
        - "Financial transactions"
        - "Mass file deletion"
        - "Binding email/contract"
        - "Account creation/deletion"

      process:
        1. "Agent prepares action with full details"
        2. "Super Brain sends notification (Telegram/WhatsApp)"
        3. "Human confirms or rejects"
        4. "Only after confirmation: execute action"

    audit_trails:
      enabled: true
      immutable: true
      stored: "ZFS compressed logs"
      retention: "7 years (GDPR requirement)"
      accessible: "CSV export on demand"

  human_oversight:
    all_critical_decisions: true
    incident_response: "Automatic human notification"
    regular_audits: "Monthly compliance review"

# =============================================================================
# COMMERCIALIZATION: Market-Ready Product
# =============================================================================
commercialization:
  target_market: "German B2B & B2C (AI, BMA, Consulting)"
  positioning: "Enterprise-grade Agentic AI with EU Sovereignty"

  product_tiers:
    starter:
      price_eur_monthly: 299
      agents: 3
      monthly_requests: 100000
      model_access: "local + Gemini"

    professional:
      price_eur_monthly: 999
      agents: 10
      monthly_requests: 1000000
      model_access: "All local + Claude + Gemini + Grok"

    enterprise:
      price_eur_monthly: "Custom"
      agents: "Unlimited"
      monthly_requests: "Unlimited"
      model_access: "All models + GPT-5.4 + dedicated support"

  deployment_options:
    saas:
      location: "Hetzner Germany"
      compliance: "GDPR compliant"
      uptime_sla: "99.9%"

    private_cloud:
      location: "Customer infrastructure"
      compliance: "Full data sovereignty"
      support: "Included"

# =============================================================================
# PERFORMANCE TARGETS
# =============================================================================
performance_targets:
  system_uptime: "99.97%"
  avg_response_time: "< 500ms"
  p95_latency: "< 2s"
  model_inference_speed:
    local_models: "20-100+ tokens/s"
    cloud_models: "5-20 tokens/s"

  agent_capabilities:
    parallel_agents: 50
    concurrent_implementations: 5
    monthly_automated_deployments: "> 20"
    revenue_per_implementation: "€1,000 - €5,000"

  financial_targets:
    monthly_revenue_eur: "€50,000"
    annual_revenue_eur: "€600,000 - €2,300,000"
    gross_margin: "> 70%"
