# Neural Brain Configuration
# Complete system configuration for Telegram interface, X monitoring, auto-implementation
# All credentials loaded from environment variables (.env)

version: "1.0.0"
environment: "production"
created_at: "2026-03-07"

# =============================================================================
# PHASE 1: Telegram Interface + Data Harvesting
# =============================================================================
telegram:
  enabled: true
  polling_mode: true  # Set to true for local testing, false for webhooks
  polling_timeout_seconds: 30
  max_message_size: 4096

  # File upload handling
  uploads:
    directory: "./neural_brain_uploads"
    max_file_size_mb: 100
    allowed_types:
      - pdf
      - txt
      - json
      - csv
      - jpg
      - png
      - mp4
      - mov

  # Chat management
  conversation:
    max_history_length: 50
    context_window_messages: 20
    auto_cleanup_hours: 24

data_harvesting:
  enabled: true
  sources:
    - chatgpt
    - claude
    - gemini
    - grok

  ingestion:
    directory: "./neural_brain_uploads"
    auto_detect_format: true
    chunk_size: 500
    overlap: 50

  knowledge_store:
    file: "./neural_brain_knowledge.json"
    max_insights: 10000
    retention_days: 365
    auto_cleanup: true

# =============================================================================
# PHASE 2: X.com Monitoring + Auto-Implementation
# =============================================================================
x_monitoring:
  enabled: true

  # Top AI experts to monitor
  experts:
    - Peter_Steingraber
    - ylecun
    - demishassabis
    - karpathy
    - sama
    - darioamodei
    - jackiehluo
    - stabilityai
    - OpenAI
    - GoogleDeepMind
    - MetaAI
    - nvidia
    - huggingface
    - anthropicai
    - perplexity_ai

  monitoring:
    check_interval_minutes: 60
    max_tweets_per_check: 100
    track_engagement: true
    keywords:
      - agentic
      - agents
      - rag
      - reasoning
      - autonomous
      - self-optimize
      - implementation
      - multimodal

  trending_detection:
    mention_threshold: 3
    time_window_hours: 24
    auto_queue_trending: true

  knowledge_store:
    file: "./neural_brain_x_monitor.json"

auto_implementation:
  enabled: true

  # Implementation pipeline configuration
  pipeline:
    design_phase: true
    sandbox_testing: true
    ab_testing: true
    auto_deployment: true
    monitoring_duration_hours: 24

  sandbox:
    directory: "./neural_brain_sandbox"
    timeout_seconds: 300
    isolation: true

  ab_testing:
    enabled: true
    duration_hours: 4
    traffic_percentage: 10
    significance_level: 0.95
    success_criteria:
      speed_improvement_percent: 20
      accuracy_improvement_percent: 10
      max_error_rate_percent: 1

  deployment:
    auto_deploy: true
    rollback_on_failure: true
    rollback_timeout_seconds: 30
    parallel_deployments: 3

  monitoring:
    track_metrics: true
    alert_on_degradation: true
    performance_thresholds:
      error_rate_percent: 1
      response_time_ms: 1000
      uptime_percent: 99.9

  knowledge_store:
    file: "./neural_brain_implementations.json"

# =============================================================================
# PHASE 3: Self-Optimization Loop + Multi-Channel Monetization
# =============================================================================
self_optimization:
  enabled: true

  feedback_loop:
    enabled: true
    cycle_duration_hours: 4
    collect_metrics: true
    learn_from_failures: true
    adjust_parameters: true

  continuous_improvement:
    monitor_performance: true
    detect_anomalies: true
    suggest_optimizations: true
    auto_apply_low_risk: true

  parameter_tuning:
    enabled: true
    variables:
      - prompt_strategy
      - concurrency_level
      - cache_ttl
      - batch_size
      - rate_limiting

monetization:
  enabled: true

  channels:
    gumroad:
      enabled: true
      auto_publish: true
      base_price_eur: 29
      products_per_week: 2
      categories:
        - ai_tools
        - prompts
        - frameworks
        - checklists

    fiverr_upwork:
      enabled: true
      auto_list: true
      min_service_price_eur: 50
      max_concurrent_gigs: 30
      refresh_interval_days: 7

    consulting:
      enabled: true
      target_market: "BMA + AI Consulting"
      min_project_value_eur: 2000
      max_concurrent_projects: 5
      specialty:
        - legal_ai
        - bma_systems
        - enterprise_ai

    twitter_revenue:
      enabled: true
      premium_posts_per_day: 2
      engagement_bonus_threshold: 1000
      revenue_share_percent: 30

    community:
      enabled: true
      name: "Agent Builders Club"
      price_per_month_eur: 29
      target_members: 1000
      content_per_week: 3

  revenue_tracking:
    file: "./neural_brain_revenue.json"
    track_all_channels: true
    currency: "EUR"
    target_monthly_eur: 50000

  account_automation:
    enabled: true
    auto_create_accounts: false  # Set to true for aggressive
    auto_verify: true
    rate_limit: 5  # accounts per day when enabled

dashboard:
  enabled: true

  interface: "telegram"
  update_frequency_seconds: 60

  metrics_displayed:
    - system_status
    - revenue_generated
    - implementations_deployed
    - trending_items
    - efficiency_metrics
    - resource_usage

  alerts:
    enabled: true
    telegram_notifications: true
    alert_threshold_error_rate: 1
    alert_threshold_revenue_drop: 500

# =============================================================================
# AI Models & APIs
# =============================================================================
ai_models:
  primary: "claude-opus-4-6"
  fallback: "claude-sonnet-4-6"

  claude_api:
    enabled: true
    max_tokens: 2048
    temperature: 0.7
    cost_tracking: true

  model_routing:
    strategy: "cost_optimized"  # or "quality_first"
    fallback_enabled: true
    failover_strategy: "round_robin"

# =============================================================================
# Database & Storage
# =============================================================================
storage:
  knowledge_store:
    type: "json"
    location: "./neural_brain_knowledge.json"
    backup_frequency_hours: 6

  implementations:
    type: "json"
    location: "./neural_brain_implementations.json"
    auto_backup: true

  x_monitoring:
    type: "json"
    location: "./neural_brain_x_monitor.json"

  revenue_tracking:
    type: "json"
    location: "./neural_brain_revenue.json"

# =============================================================================
# Security & Rate Limiting
# =============================================================================
security:
  api_keys:
    require_env_variables: true
    required_keys:
      - TELEGRAM_BOT_TOKEN
      - ANTHROPIC_API_KEY
      - TELEGRAM_USER_ID

  rate_limiting:
    telegram_requests_per_minute: 30
    api_calls_per_minute: 100
    implementation_cooldown_seconds: 300

  audit:
    enabled: true
    log_all_operations: true
    log_file: "./neural_brain_audit.log"

# =============================================================================
# Logging & Monitoring
# =============================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "json"
  destinations:
    - console
    - file

  file:
    path: "./neural_brain.log"
    max_size_mb: 100
    backup_count: 5

monitoring:
  enabled: true
  metrics_file: "./neural_brain_metrics.json"

  resource_tracking:
    enabled: true
    check_interval_seconds: 30
    alert_on_high_usage: true

  performance_tracking:
    enabled: true
    track_response_times: true
    track_success_rates: true

# =============================================================================
# Advanced Settings
# =============================================================================
advanced:
  # Aggressive growth mode
  aggressive_mode: true
  max_parallel_implementations: 5
  auto_retry_failed_implementations: true
  retry_count: 3

  # Self-healing
  auto_repair: true
  health_check_interval_seconds: 60
  auto_restart_failed_services: true

  # Performance optimization
  caching:
    enabled: true
    ttl_seconds: 300
    max_size_mb: 500

  batch_processing:
    enabled: true
    batch_size: 10
    batch_timeout_seconds: 60

# =============================================================================
# Integration Points
# =============================================================================
integrations:
  empire_engine:
    enabled: true
    endpoint: "http://localhost:8888"
    sync_enabled: true

  antigravity_router:
    enabled: true
    endpoint: "http://localhost:9000"

  openclaw_agents:
    enabled: true
    endpoint: "http://localhost:18789"

  lobehub_skills:
    enabled: true
    endpoint: "http://localhost:8080/api/v1/skills"

  chromadb:
    enabled: false  # Optional RAG database
    host: "localhost"
    port: 8000
